<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía Maestra Inglés B1 · Policía Local de Canarias</title>
  <meta name="theme-color" content="#10233d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="h2d-logo.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__badge">Fuente única de verdad: ingles-definitivo-maestro.md</div>
    <h1>Guía Maestra Interactiva · Inglés B1 Policía Local de Canarias</h1>
    <p>Teoría, banco de preguntas, readings, paráfrasis, errores típicos, vocabulario y simulacros en una sola web.</p>
  </header>

  <main class="layout">
    <section class="panel summary" id="summary"></section>

    <section class="panel controls">
      <div class="controls__grid">
        <label>
          <span>Sección</span>
          <select id="sectionFilter"></select>
        </label>
        <label>
          <span>Kind</span>
          <select id="kindFilter"></select>
        </label>
        <label>
          <span>Tipo</span>
          <select id="typeFilter"></select>
        </label>
        <label>
          <span>Modo</span>
          <select id="datasetFilter">
            <option value="all">Guía + preguntas</option>
            <option value="guide">Solo guía</option>
            <option value="questions">Solo práctica</option>
          </select>
        </label>
        <label class="search-box">
          <span>Buscar</span>
          <input id="searchInput" type="search" placeholder="gramática, charged with, reading, etc.">
        </label>
      </div>
      <div class="quick-links" id="quickLinks"></div>
    </section>

    <section class="panel readings-panel">
      <h2>Readings conservados</h2>
      <div id="readingsList" class="chip-list"></div>
    </section>

    <section class="results-header">
      <div>
        <h2 id="resultsTitle">Contenido cargado</h2>
        <p id="resultsMeta"></p>
      </div>
      <button id="resetBtn" class="ghost-btn">Restablecer filtros</button>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card__top">
        <div>
          <p class="eyebrow"></p>
          <h3 class="card__title"></h3>
        </div>
        <div class="pill-group"></div>
      </div>
      <p class="card__prompt"></p>
      <details class="card__section details--content" open>
        <summary>Contenido / teoría</summary>
        <div class="markdown card__content"></div>
      </details>
      <details class="card__section details--answer hidden">
        <summary>Respuesta / modelo</summary>
        <div class="markdown card__answer"></div>
      </details>
      <details class="card__section details--explanation hidden">
        <summary>Explicación</summary>
        <div class="markdown card__explanation"></div>
      </details>
      <footer class="card__footer"></footer>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
